<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Generator Galaxy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ⭐ Stars container */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:0;
  overflow:hidden;
}

/* ⭐ Individual stars */
.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation: move linear infinite;
}

/* ⭐ Sizes */
.small{ width:2px; height:2px; opacity:0.6; }
.medium{ width:3px; height:3px; opacity:0.8; }
.big{ width:5px; height:5px; opacity:1; }

/* ⭐ Movement */
@keyframes move{
  from{ transform: translateY(-10px); }
  to{ transform: translateY(100vh); }
}

/* UI Box */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  border:1px solid white;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:bold;
}

button:hover{
  background:gray;
}

#qr{
  margin-top:15px;
}

.history{
  margin-top:10px;
  max-height:80px;
  overflow:auto;
  font-size:12px;
  border-top:1px solid white;
}
</style>
</head>

<body>

<!-- ⭐ Stars -->
<div class="stars" id="stars"></div>

<!-- UI -->
<div class="container">
  <h2>QR Generator</h2>

  <input type="text" id="text" placeholder="Enter text or URL">

  <button onclick="generateQR()">Generate</button>
  <button onclick="downloadQR()">Download</button>
  <button onclick="copyText()">Copy</button>

  <div id="qr"></div>

  <div class="history" id="history"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ⭐ Create Stars
let starsContainer = document.getElementById("stars");

for(let i = 0; i < 120; i++){
  let star = document.createElement("div");
  star.classList.add("star");

  let sizes = ["small","medium","big"];
  star.classList.add(sizes[Math.floor(Math.random()*3)]);

  star.style.left = Math.random()*100 + "vw";
  star.style.top = Math.random()*100 + "vh";

  star.style.animationDuration = (5 + Math.random()*10) + "s";

  starsContainer.appendChild(star);
}

// QR Logic
let qr;

function generateQR(){
  let text = document.getElementById("text").value;

  if(text === ""){
    alert("Enter something!");
    return;
  }

  document.getElementById("qr").innerHTML = "";

  qr = new QRCode(document.getElementById("qr"), {
    text: text,
    width: 200,
    height: 200,
    colorDark: "#ffffff",
    colorLight: "#000000"
  });

  saveHistory(text);
}

function downloadQR(){
  let canvas = document.querySelector("#qr canvas");
  if(!canvas){
    alert("Generate QR first!");
    return;
  }
  let link = document.createElement("a");
  link.download = "qr.png";
  link.href = canvas.toDataURL();
  link.click();
}

function copyText(){
  let text = document.getElementById("text");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

function saveHistory(text){
  let history = document.getElementById("history");
  let item = document.createElement("div");
  item.innerText = text;
  item.onclick = () => {
    document.getElementById("text").value = text;
    generateQR();
  };
  history.prepend(item);
}
</script>

</body>
</html>
