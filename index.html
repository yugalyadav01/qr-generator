<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YUGAL QR - PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  color:white;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ⭐ Galaxy Stars */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation: move linear infinite, twinkle 2s infinite alternate;
}

.small{width:2px;height:2px;}
.medium{width:3px;height:3px;}
.big{width:5px;height:5px;}

@keyframes move{
  from{transform:translateY(-10px);}
  to{transform:translateY(100vh);}
}

@keyframes twinkle{
  from{opacity:0.3;}
  to{opacity:1;}
}

/* 🌟 Glass Card */
.container{
  position:relative;
  z-index:2;
  width:340px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  text-align:center;
  box-shadow:0 0 25px rgba(255,255,255,0.1);
}

/* Title */
h1{
  font-size:22px;
  margin-bottom:5px;
}
.tag{
  font-size:12px;
  color:gray;
  margin-bottom:15px;
}

/* Input */
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
  outline:none;
}

/* Buttons */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#ccc;
}

/* QR */
#qr{
  margin-top:15px;
}

/* History */
.history{
  margin-top:10px;
  max-height:80px;
  overflow:auto;
  font-size:12px;
  border-top:1px solid rgba(255,255,255,0.2);
  padding-top:5px;
}

/* Footer */
.footer{
  margin-top:10px;
  font-size:10px;
  color:gray;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1>YUGAL QR</h1>
  <div class="tag">Fast • Free • Secure</div>

  <input type="text" id="text" placeholder="Enter text or URL">

  <button onclick="generateQR()">Generate</button>
  <button onclick="downloadQR()">Download</button>
  <button onclick="copyText()">Copy</button>

  <div id="qr"></div>

  <div class="history" id="history"></div>

  <div class="footer">© 2026 Yugal QR</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ⭐ Stars
let starsContainer = document.getElementById("stars");

for(let i=0;i<150;i++){
  let star=document.createElement("div");
  star.classList.add("star");

  let sizes=["small","medium","big"];
  star.classList.add(sizes[Math.floor(Math.random()*3)]);

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";

  star.style.animationDuration=(5+Math.random()*10)+"s";

  starsContainer.appendChild(star);
}

// QR
function generateQR(){
  let text=document.getElementById("text").value;

  if(text===""){
    alert("Enter something!");
    return;
  }

  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:text,
    width:200,
    height:200,
    colorDark:"#ffffff",
    colorLight:"#000000"
  });

  saveHistory(text);
}

// Download
function downloadQR(){
  let canvas=document.querySelector("#qr canvas");
  if(!canvas){
    alert("Generate QR first!");
    return;
  }

  let link=document.createElement("a");
  link.download="yugal-qr.png";
  link.href=canvas.toDataURL();
  link.click();
}

// Copy
function copyText(){
  let text=document.getElementById("text");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

// History
function saveHistory(text){
  let history=document.getElementById("history");
  let item=document.createElement("div");

  item.innerText=text;
  item.style.cursor="pointer";

  item.onclick=()=>{
    document.getElementById("text").value=text;
    generateQR();
  };

  history.prepend(item);
}
</script>

</body>
</html>
