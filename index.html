<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YUGAL QR PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;overflow:hidden;}
.stars{position:fixed;width:100%;height:100%;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:move linear infinite, twinkle 2s infinite alternate;}
.small{width:2px;height:2px;}
.medium{width:3px;height:3px;}
.big{width:5px;height:5px;}
@keyframes move{from{transform:translateY(-10px);}to{transform:translateY(100vh);}}
@keyframes twinkle{from{opacity:0.3;}to{opacity:1};}

.app{display:flex;height:100vh;position:relative;z-index:2;}
.left{width:35%;padding:30px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 40px rgba(0,255,255,0.2);border-radius:20px;}
.right{width:65%;display:flex;justify-content:center;align-items:center;flex-direction:column;}

h1{font-size:26px;}
.tag{color:gray;margin-bottom:20px;}
select, input{width:100%;padding:12px;margin:10px 0;border:1px solid white;background:black;color:white;border-radius:10px;}
button{width:100%;padding:12px;margin:5px 0;border:none;border-radius:10px;cursor:pointer;background:white;color:black;font-weight:bold;transition:0.3s;}
button{background:linear-gradient(45deg,#00f2fe,#4facfe);color:black;}
button:hover{box-shadow:0 0 15px #00f2fe;}
#qr canvas{width:320px !important;height:320px !important;}

.history{margin-top:20px;max-height:150px;overflow:auto;font-size:13px;border-top:1px solid rgba(255,255,255,0.2);}
.history div{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;padding:5px 10px;border-radius:10px;opacity:0;animation:fadeIn 0.3s forwards;transition:0.2s;}
.history div:hover{transform:scale(1.02);box-shadow:0 0 10px rgba(0,255,255,0.3);background:rgba(255,255,255,0.05);}
.history span{cursor:pointer;}
.history button{background:transparent;border:none;cursor:pointer;}
.history button svg{transition: transform 0.2s ease, fill 0.2s ease;}
.history button:hover svg{transform: scale(1.3) rotate(-10deg); fill:#ff4d4d;}

@keyframes fadeIn{to{opacity:1;}}

#qr{animation:pop 0.3s ease forwards;}
@keyframes pop{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}

@media(max-width:768px){
  .app{flex-direction:column;}
  .left, .right{width:100%; margin-bottom:20px;}
  #qr canvas{width:90vw !important;height:90vw !important;}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app">
  <!-- LEFT -->
  <div class="left">
    <h1>YUGAL QR</h1>
    <div class="tag">Fast • Free • Secure</div>

    <select id="type" onchange="changeType()">
      <option value="text">Text</option>
      <option value="wifi">WiFi</option>
      <option value="upi">UPI</option>
    </select>

    <div id="inputs"></div>

    <button onclick="generateQR()">Generate</button>
    <button onclick="downloadQR()">Download</button>
    <button onclick="shareQR()">Share QR</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="startScanner()">Scan QR</button>
    <button onclick="clearHistory()">Clear History</button>
 
</div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div id="qrText" style="margin-bottom:10px;color:gray;">Your QR will appear here 👇</div>
    <div id="qr"></div>
    <div id="reader" style="width:300px;margin-top:20px;"></div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
// ⭐ STARS
let starsContainer = document.getElementById("stars");
for(let i=0;i<120;i++){
  let star=document.createElement("div");
  star.classList.add("star");
  let sizes=["small","medium","big"];
  star.classList.add(sizes[Math.floor(Math.random()*3)]);
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(5+Math.random()*10)+"s";
  starsContainer.appendChild(star);
}

// ---------- TYPE SWITCH ----------
function changeType(){
  let type=document.getElementById("type").value;
  let inputs=document.getElementById("inputs");

  if(type==="text") inputs.innerHTML=`<input id="text" placeholder="Enter text or URL" list="historyList"><datalist id="historyList"></datalist>`;
  else if(type==="wifi") inputs.innerHTML=`<input id="ssid" placeholder="WiFi Name"><input id="pass" placeholder="Password">`;
  else if(type==="upi") inputs.innerHTML=`<input id="upi" placeholder="UPI ID"><input id="name" placeholder="Name"><input id="amount" placeholder="Amount">`;
}

// ---------- QR GENERATE ----------
function generateQR(){
  let type=document.getElementById("type").value;
  let qrDiv=document.getElementById("qr");
  qrDiv.innerHTML="";

  let data="";
  if(type==="text") data=document.getElementById("text").value.trim();
  else if(type==="wifi"){
    let ssid=document.getElementById("ssid").value;
    let pass=document.getElementById("pass").value;
    data=`WIFI:T:WPA;S:${ssid};P:${pass};;`;
  } else if(type==="upi"){
    let upi=document.getElementById("upi").value;
    let name=document.getElementById("name").value;
    let amount=document.getElementById("amount").value;
    data=`upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;
  }

  if(!data){alert("Enter data first!"); return;}
  new QRCode(qrDiv,{text:data,width:300,height:300});
  saveHistory(data);
}

// ---------- DOWNLOAD ----------
function downloadQR(){
  let img=document.querySelector("#qr img");
  if(!img){ alert("Generate QR first!"); return;}
  let a=document.createElement("a"); a.href=img.src; a.download="yugal-qr.png"; a.click();
}

// ---------- COPY ----------
function copyText(){
  let input=document.querySelector("#inputs input");
  if(!input) return;
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}

// ---------- SHARE ----------
function shareQR(){
  let img=document.querySelector("#qr img");
  if(!img || !img.src){ alert("Generate QR first!"); return;}
  fetch(img.src).then(r=>r.blob()).then(async blob=>{
    const file=new File([blob],"yugal-qr.png",{type:"image/png"});
    if(navigator.share){
      try{ await navigator.share({title:"My QR Code",text:"Scan this QR",files:[file]}); }
      catch(e){ alert("Sharing cancelled or not supported"); }
    } else { alert("Sharing not supported in this browser. Download instead."); }
  });
}

// ---------- HISTORY ----------
function saveHistory(text){
  if(!text) return;
  let old=JSON.parse(localStorage.getItem("qrHistory"))||[];
  if(!old.includes(text)) old.unshift(text);
  localStorage.setItem("qrHistory",JSON.stringify(old));
  renderHistory();
}

function renderHistory(){
  let historyDiv=document.getElementById("history");
  historyDiv.innerHTML="";
  let data=JSON.parse(localStorage.getItem("qrHistory"))||[];

  // autocomplete datalist
  let datalist=document.getElementById("historyList");
  if(datalist) datalist.innerHTML="";
  data.forEach(item=>{
    if(datalist){
      let option=document.createElement("option");
      option.value=item;
      datalist.appendChild(option);
    }
  });

  if(data.length===0){ historyDiv.innerHTML="<div style='color:gray;font-size:12px;'>No QR history yet</div>"; return;}

  data.forEach((item,index)=>{
    let div=document.createElement("div");

    let color="#ffffff";
    let type="text";
    if(item.startsWith("WIFI:")) { type="wifi"; color="#00ffcc";}
    else if(item.startsWith("upi://")) { type="upi"; color="#ffcc00";}

    let badge=document.createElement("span");
    badge.innerText=type.toUpperCase();
    badge.style.background=color; badge.style.color="black"; badge.style.padding="2px 5px";
    badge.style.borderRadius="5px"; badge.style.fontSize="10px"; badge.style.marginRight="10px";
    div.appendChild(badge);

    let span=document.createElement("span"); span.innerText=item; span.style.color=color;
    span.onclick=()=>{ document.getElementById("type").value="text"; changeType(); document.getElementById("text").value=item; generateQR(); };
    div.appendChild(span);

    let delBtn=document.createElement("button");
    delBtn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="red" viewBox="0 0 16 16">
      <path d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7H6v7a.5.5 0 0 1-1 0v-7z"/>
      <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2H6.5a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1H14a1 1 0 0 1 1 1zm-3 0H4v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4z"/>
    </svg>`;
    delBtn.onclick=(e)=>{ e.stopPropagation(); data.splice(index,1); localStorage.setItem("qrHistory",JSON.stringify(data)); renderHistory(); };
    div.appendChild(delBtn);

    historyDiv.appendChild(div);
  });
}

function clearHistory(){ if(confirm("Are you sure you want to delete all QR history?")){ localStorage.removeItem("qrHistory"); renderHistory(); alert("History cleared!"); }}

// ---------- SCANNER ----------
function startScanner(){
  const scanner=new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
    (decodedText)=>{
      let type="text";
      if(decodedText.startsWith("WIFI:")) type="wifi";
      else if(decodedText.startsWith("upi://")) type="upi";

      document.getElementById("type").value=type;
      changeType();

      if(type==="text") document.getElementById("text").value=decodedText;
      else if(type==="wifi"){
        let ssidMatch=decodedText.match(/S:([^;]+);/);
        let passMatch=decodedText.match(/P:([^;]+);/);
        if(ssidMatch) document.getElementById("ssid").value=ssidMatch[1];
        if(passMatch) document.getElementById("pass").value=passMatch[1];
      } else if(type==="upi"){
        let upiMatch=decodedText.match(/pa=([^&]+)/);
        let nameMatch=decodedText.match(/pn=([^&]+)/);
        let amountMatch=decodedText.match(/am=([^&]+)/);
        if(upiMatch) document.getElementById("upi").value=upiMatch[1];
        if(nameMatch) document.getElementById("name").value=nameMatch[1];
        if(amountMatch) document.getElementById("amount").value=amountMatch[1];
      }

      generateQR();
      scanner.stop();
      alert("Scanned and QR generated!");
    },
    (error)=>{ console.log(error); }
  ).catch(err=>{ alert("Camera permission denied or not supported"); });
}

// ---------- INITIAL LOAD ----------
window.onload=()=>{ changeType(); renderHistory(); };

// ---------- AUTO GENERATE ON INPUT ----------
document.addEventListener("input",function(e){ if(e.target.closest("#inputs")) generateQR(); });
</script>
</body>
</html>
