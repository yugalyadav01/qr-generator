
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yugal QR</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:900px;
display:flex;
align-items:center;
justify-content:space-between;
gap:40px;
}

/* left QR */
.left{
flex:1;
text-align:left;
}

#qr{
width:140px;
}

/* right content */

.right{
flex:2;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
opacity:0.7;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:none;
outline:none;
margin-bottom:15px;
}

button{
padding:12px 18px;
border:none;
cursor:pointer;
margin-right:10px;
}

.generate{
background:white;
color:black;
}

.download{
background:#444;
color:white;
}

/* mobile */

@media(max-width:700px){

.container{
flex-direction:column;
text-align:center;
}

.left{
text-align:center;
}

}

</style>
</head>

<body>
  <canvas id="stars"></canvas>

<div class="container">

<div class="left">
<img id="qr">
</div>

<div class="right">

<h1>Welcome 👋</h1>
<p>Create your QR code instantly</p>

<input id="text" placeholder="Enter text or URL">

<button class="generate" onclick="generateQR()">Generate</button>
<button class="download" onclick="downloadQR()">Download</button>

</div>

</div>

<script>

function generateQR(){

let text=document.getElementById("text").value;

let qr="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+text;

document.getElementById("qr").src=qr;

}

function downloadQR(){

let img=document.getElementById("qr").src;

let a=document.createElement("a");

a.href=img;

a.download="qr.png";

a.click();

}

</script>

</body>
</html>
