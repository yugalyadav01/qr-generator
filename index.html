<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YUGAL QR PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* ⭐ STARS */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation: move linear infinite, twinkle 2s infinite alternate;
}

.small{width:2px;height:2px;}
.medium{width:3px;height:3px;}
.big{width:5px;height:5px;}

@keyframes move{
  from{transform:translateY(-10px);}
  to{transform:translateY(100vh);}
}

@keyframes twinkle{
  from{opacity:0.3;}
  to{opacity:1;}
}

/* APP LAYOUT */
.app{
  display:flex;
  height:100vh;
  position:relative;
  z-index:2;
}

/* LEFT PANEL */
.left{
  width:35%;
  padding:30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,0.1);
}

/* RIGHT PANEL */
.right{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* TEXT */
h1{font-size:26px;}
.tag{color:gray;margin-bottom:20px;}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid white;
  background:black;
  color:white;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  background:#ccc;
  transform:scale(1.03);
}

/* QR BIG */
#qr canvas{
  width:320px !important;
  height:320px !important;
}

/* HISTORY */
.history{
  margin-top:20px;
  max-height:150px;
  overflow:auto;
  font-size:13px;
  border-top:1px solid rgba(255,255,255,0.2);
}

/* SCANNER */
#reader{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="app">

  <!-- LEFT -->
  <div class="left">
    <h1>YUGAL QR</h1>
    <div class="tag">Fast • Free • Secure</div>

    <input type="text" id="text" placeholder="Enter text or URL">

    <button onclick="generateQR()">Generate</button>
    <button onclick="downloadQR()">Download</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="startScanner()">Scan QR</button>

    <div class="history" id="history"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
  <div id="qrBox" style="text-align:center;">

  <div id="qrText" style="margin-bottom:10px;font-size:18px;color:gray;">
    Your QR will appear here 👇
  </div>

  <div id="qr"></div>

</div>
    <div id="reader"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
// ⭐ STARS
let starsContainer = document.getElementById("stars");

for(let i=0;i<150;i++){
  let star=document.createElement("div");
  star.classList.add("star");

  let sizes=["small","medium","big"];
  star.classList.add(sizes[Math.floor(Math.random()*3)]);

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(5+Math.random()*10)+"s";

  starsContainer.appendChild(star);
}

// QR GENERATE
function generateQR(){
  let text=document.getElementById("text").value;

  if(text===""){
    alert("Enter something!");
    return;
  }

  document.getElementById("qr").innerHTML="";
  document.getElementById("qrText").innerText="Your QR is here 👇"; // 👈 CHANGE TEXT

  new QRCode(document.getElementById("qr"),{
    text:text,
    width:300,
    height:300,
    colorDark:"#ffffff",
    colorLight:"#000000"
  });

  saveHistory(text);
}

// DOWNLOAD
function downloadQR(){
  let canvas=document.querySelector("#qr canvas");
  if(!canvas){
    alert("Generate QR first!");
    return;
  }

  let link=document.createElement("a");
  link.download="yugal-qr.png";
  link.href=canvas.toDataURL();
  link.click();
}

// COPY
function copyText(){
  let text=document.getElementById("text");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

// HISTORY
function saveHistory(text){
  let history=document.getElementById("history");
  let item=document.createElement("div");

  item.innerText=text;
  item.style.cursor="pointer";

  item.onclick=()=>{
    document.getElementById("text").value=text;
    generateQR();
  };

  history.prepend(item);
}

// SCANNER
function startScanner(){
  let reader = new Html5Qrcode("reader");

  reader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qrCodeMessage => {
      alert("Scanned: " + qrCodeMessage);
      reader.stop();
    }
  );
}
</script>

</body>
</html>
