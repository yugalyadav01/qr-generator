
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yugal QR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* background canvas */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:black;
}

/* layout */
.container{
width:90%;
max-width:900px;
display:flex;
align-items:center;
justify-content:space-between;
gap:40px;
}

/* left QR */
.left{
flex:1;
}

#qr{
width:140px;
filter:drop-shadow(0 0 10px white);
}

/* right content */
.right{
flex:2;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
opacity:0.7;
margin-bottom:20px;
}

/* input */
input{
width:100%;
padding:12px;
font-size:16px;
border:none;
outline:none;
margin-bottom:15px;
}

/* buttons */
button{
padding:12px 18px;
border:none;
cursor:pointer;
margin-right:10px;
}

.generate{
background:white;
color:black;
}

.download{
background:#333;
color:white;
}

/* mobile */
@media(max-width:700px){
.container{
flex-direction:column;
text-align:center;
}
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="left">
<img id="qr">
</div>

<div class="right">
<h1>Welcome 👋</h1>
<p>Create your QR code instantly</p>

<input id="text" placeholder="Enter text or URL">

<button class="generate" onclick="generateQR()">Generate</button>
<button class="download" onclick="downloadQR()">Download</button>
</div>

</div>

<script>

/* QR CODE */
function generateQR(){
let text=document.getElementById("text").value;
let qr="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+text;
document.getElementById("qr").src=qr;
}

function downloadQR(){
let img=document.getElementById("qr").src;
let a=document.createElement("a");
a.href=img;
a.download="qr.png";
a.click();
}

/* GALAXY BACKGROUND */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shootingStars = [];

// stars
for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4
});
}

// shooting stars
function createShootingStar(){
shootingStars.push({
x:Math.random()*canvas.width,
y:0,
length:Math.random()*80+50,
speed:Math.random()*6+4
});
}

setInterval(createShootingStar,2000);

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowBlur=10;
ctx.shadowColor="white";

/* stars */
stars.forEach(star=>{

ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

star.y+=star.speed;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}

});

/* shooting stars */
shootingStars.forEach((s,i)=>{

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-s.length,s.y+s.length);
ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.stroke();

s.x+=s.speed;
s.y+=s.speed;

if(s.y>canvas.height){
shootingStars.splice(i,1);
}

});

requestAnimationFrame(animate);
}

animate();

/* resize fix */
window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
